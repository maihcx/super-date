<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperDate — Demo</title>
  <link rel="stylesheet" href="../dist/super-date.min.css">
  <script src="../dist/super-date.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    h1 span { color: #38bdf8; }

    h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #38bdf8;
      border-top: 1px solid #334155;
      padding-top: 1rem;
      margin-top: 0.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
    }

    input[type="date"],
    input[type="time"],
    input[type="datetime-local"] {
      height: 30px;
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus,
    input[type="time"]:focus,
    input[type="datetime-local"]:focus {
      border-color: #38bdf8;
    }

    .superdate-wrapper { width: 100%; }

    .superdate-overlay {
      --superdate-active-bg: #0ea5e9;
      --superdate-active-color: #fff;
      --superdate-placeholder-color: #475569;
      --superdate-sep-color: #64748b;
      color: #e2e8f0;
    }

    .note {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.5;
    }

    code {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.78rem;
      color: #7dd3fc;
    }

    button {
      align-self: flex-start;
      padding: 8px 18px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #38bdf8; }

    #output {
      font-size: 0.85rem;
      color: #7dd3fc;
      font-family: monospace;
      min-height: 1.2em;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Super<span>Date</span> Demo</h1>

  <!-- ── DATE inputs ──────────────────────────────────────────────── -->
  <h2>input type="date"</h2>

  <div class="field">
    <label>dd/MM/yyyy (mặc định)</label>
    <input type="date" class="sd" id="d1" />
  </div>

  <div class="field">
    <label>MM-dd-yyyy (data-date-format)</label>
    <input type="date" class="sd" id="d2" data-date-format="MM-dd-yyyy" />
  </div>

  <div class="field">
    <label>yyyy/MM/dd</label>
    <input type="date" class="sd" id="d3" data-date-format="yyyy/MM/dd" />
  </div>

  <!-- ── TIME inputs ──────────────────────────────────────────────── -->
  <h2>input type="time"</h2>

  <div class="field">
    <label>HH:mm (mặc định)</label>
    <input type="time" class="sd" id="t1" />
  </div>

  <div class="field">
    <label>HH:mm:ss (data-time-format)</label>
    <input type="time" class="sd" id="t2" data-time-format="HH:mm:ss" />
  </div>

  <!-- ── DATETIME-LOCAL inputs ─────────────────────────────────────── -->
  <h2>input type="datetime-local"</h2>

  <div class="field">
    <label>dd/MM/yyyy HH:mm (space delimiter)</label>
    <input type="datetime-local" class="sd" id="dt1" />
  </div>

  <div class="field">
    <label>yyyy-MM-dd | HH:mm:ss (custom delimiter via data-attribute)</label>
    <input type="datetime-local" class="sd" id="dt2"
      data-date-format="yyyy-MM-dd"
      data-time-format="HH:mm:ss"
      data-date-time-delimiter=" | " />
  </div>

  <!-- ── Dynamic ──────────────────────────────────────────────────── -->
  <div class="field">
    <label>Dynamic input</label>
    <div id="dynamic-container"></div>
    <button id="add-btn" style="margin-top:6px">+ Thêm input mới</button>
  </div>

  <!-- ── Read values ──────────────────────────────────────────────── -->
  <div class="field">
    <label>Read values</label>
    <button id="read-btn">Đọc giá trị</button>
    <div id="output"></div>
  </div>

  <p class="note">
    Keyboard: <code>↑ ↓</code> thay đổi, <code>← →</code> / <code>Tab</code> di chuyển segment,
    <code>0-9</code> gõ trực tiếp. Hỗ trợ copy/paste.
  </p>
</div>

<script type="module">
  window.onload = () => {
    SuperDate.bind('.sd', {
      format: 'dd/MM/yyyy',
      timeFormat: 'HH:mm',
      dateTimeDelimiter: ' ',
    });
  }

  let count = 0;
  document.getElementById('add-btn').addEventListener('click', () => {
    count++;
    const types = ['date', 'time', 'datetime-local'];
    const wrap = document.createElement('div');
    wrap.style.marginTop = '6px';
    const input = document.createElement('input');
    input.type = types[count % 3];
    input.className = 'sd';
    wrap.appendChild(input);
    document.getElementById('dynamic-container').appendChild(wrap);
  });

  document.getElementById('read-btn').addEventListener('click', () => {
    const ids = ['d1','d2','d3','t1','t2','dt1','dt2'];
    const vals = ids.map(id => {
      const el = document.getElementById(id);
      return `#${id} (${el.type}): ${el.value || '(trống)'}`;
    });
    document.getElementById('output').textContent = vals.join('\n');
  });
</script>
</body>
</html>
